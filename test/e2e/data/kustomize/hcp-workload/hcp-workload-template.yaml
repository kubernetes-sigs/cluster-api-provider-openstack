---
apiVersion: v1
data:
  cacert: ${OPENSTACK_CLOUD_CACERT_B64}
  clouds.yaml: ${OPENSTACK_CLOUD_YAML_B64}
kind: Secret
metadata:
  labels:
    clusterctl.cluster.x-k8s.io/move: "true"
  name: ${CLUSTER_NAME}-cloud-config
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: ${CLUSTER_NAME}-md-0
spec:
  template:
    spec:
      files:
      - content: |
          #!/bin/bash
          DOWNLOAD_E2E_IMAGE=${DOWNLOAD_E2E_IMAGE:=false}
          if [ ! "${DOWNLOAD_E2E_IMAGE}" = true ]; then
            echo "Not downloading E2E image, exiting"
            exit 0
          fi
          # Download the locally built CAPO controller image
          echo "Downloading ${E2E_IMAGE_URL}"
          wget "${E2E_IMAGE_URL}" -O "/tmp/capo-controller-manager.tar"
          sudo ctr -n k8s.io images import "/tmp/capo-controller-manager.tar" || echo "* ignoring expected 'ctr images import' result"
        owner: root:root
        path: /usr/local/bin/ci-artifacts-openstack.sh
        permissions: "0750"
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            cloud-provider: external
            provider-id: openstack:///'{{ instance_id }}'
          name: '{{ local_hostname }}'
      postKubeadmCommands:
      - /usr/local/bin/ci-artifacts-openstack.sh
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: ${CLUSTER_NAME}
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
      - 10.244.0.0/16  # Different from management cluster
    serviceDomain: cluster.local
    services:
      cidrBlocks:
      - 10.96.0.0/12   # Different from management cluster
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
    kind: KamajiControlPlane
    name: ${CLUSTER_NAME}-control-plane
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: OpenStackCluster
    name: ${CLUSTER_NAME}
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: ${CLUSTER_NAME}-md-0
spec:
  clusterName: ${CLUSTER_NAME}
  replicas: ${WORKER_MACHINE_COUNT}
  selector:
    matchLabels: null
  template:
    spec:
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: ${CLUSTER_NAME}-md-0
      clusterName: ${CLUSTER_NAME}
      failureDomain: ${OPENSTACK_FAILURE_DOMAIN}
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: OpenStackMachineTemplate
        name: ${CLUSTER_NAME}-md-0
      version: ${KUBERNETES_VERSION}
---
apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
kind: KamajiControlPlane
metadata:
  name: ${CLUSTER_NAME}-control-plane
spec:
  dataStoreName: ${CLUSTER_DATASTORE}
  addons:
    coreDNS: {}
    kubeProxy: {}
  network:
    serviceType: ${HCP_SERVICE_TYPE}
  kubernetesSemVer: ${KUBERNETES_VERSION}
  deployment:
    replicas: ${CONTROL_PLANE_MACHINE_COUNT}
    resources:
      limits:
        cpu: ${HCP_CPU_LIMIT}
        memory: ${HCP_MEMORY_LIMIT}
      requests:
        cpu: ${HCP_CPU_REQUEST}
        memory: ${HCP_MEMORY_REQUEST}
    nodeSelector:
      kubernetes.io/os: linux
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: OpenStackCluster
metadata:
  name: ${CLUSTER_NAME}
spec:
  apiServerLoadBalancer:
    enabled: true
  bastion:
    enabled: true
    spec:
      flavor: ${OPENSTACK_BASTION_MACHINE_FLAVOR}
      sshKeyName: ${OPENSTACK_SSH_KEY_NAME}
  controlPlaneAvailabilityZones:
  - ${OPENSTACK_FAILURE_DOMAIN}
  externalNetwork:
    filter:
      name: ${OPENSTACK_EXTERNAL_NETWORK_NAME}
  identityRef:
    cloudName: ${OPENSTACK_CLOUD}
    name: ${CLUSTER_NAME}-cloud-config
  managedSecurityGroups:
    allNodesSecurityGroupRules:
    - description: Created by cluster-api-provider-openstack - BGP (calico)
      direction: ingress
      etherType: IPv4
      name: BGP (Calico)
      portRangeMax: 179
      portRangeMin: 179
      protocol: tcp
      remoteManagedGroups:
      - controlplane
      - worker
    - description: Created by cluster-api-provider-openstack - IP-in-IP (calico)
      direction: ingress
      etherType: IPv4
      name: IP-in-IP (calico)
      protocol: "4"
      remoteManagedGroups:
      - controlplane
      - worker
  managedSubnets:
  - cidr: 10.20.0.0/24  # Different from management cluster network
    dnsNameservers:
    - ${OPENSTACK_DNS_NAMESERVERS}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: OpenStackMachineTemplate
metadata:
  name: ${CLUSTER_NAME}-md-0
spec:
  template:
    spec:
      flavor: ${OPENSTACK_NODE_MACHINE_FLAVOR}
      sshKeyName: ${OPENSTACK_SSH_KEY_NAME} 